  no_banner: "<tg-emoji emoji-id=6010394680179562842>😶</tg-emoji> <b>По указанной ссылке </b><code>{link}</code><b> ничего не найдено.\n\nПроверьте целостность вашего файла по ссылке, а так же удостоверьтесь, что ссылка указывает прямо на файл.</b> мяу мрр"
